services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - db_data:/app/data
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
